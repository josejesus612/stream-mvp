<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRC - Encuentro Virtual Comunidades de Internet de Boyacá</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-title { font-family: 'Rubik Mono One', sans-serif; }
        .font-body { font-family: 'Barlow Condensed', sans-serif; }
        /* Fondo con patrón de ondas abstracto emulando el KV */
        .bg-kv {
            background-color: #fcfbfa;
            background-image: radial-gradient(#e5a900 0.5px, transparent 0.5px), radial-gradient(#422513 0.5px, #fcfbfa 0.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            background-opacity: 0.05;
        }
    </style>
</head>
<body class="bg-kv text-gray-900 font-body h-screen flex flex-col">

    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-[#422513] text-white p-8 rounded-none shadow-2xl w-full max-w-md border-t-8 border-[#e5a900]">
            <div class="text-center mb-6">
                <span class="bg-[#e5a900] text-[#422513] font-bold px-3 py-1 text-sm tracking-wider uppercase">¡Conéctate con la CRC!</span>
                <h2 class="font-title text-xl mt-4 text-white uppercase tracking-tight">Encuentro Virtual</h2>
                <p class="text-gray-300 text-sm mt-1">Comunidades de Internet de Boyacá</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm uppercase tracking-wider text-gray-300">Usuario de Acceso</label>
                    <input type="text" id="username" required class="w-full p-3 rounded-none bg-white text-gray-900 border-none focus:ring-2 focus:ring-[#e5a900] outline-none">
                </div>
                <div>
                    <label class="block text-sm uppercase tracking-wider text-gray-300">Contraseña</label>
                    <input type="password" id="password" required class="w-full p-3 rounded-none bg-white text-gray-900 border-none focus:ring-2 focus:ring-[#e5a900] outline-none">
                </div>
                <button type="submit" class="w-full bg-[#e5a900] hover:bg-[#cc9600] text-[#422513] font-title py-3 text-sm transition uppercase tracking-wider">
                    Ingresar al Evento
                </button>
            </form>
        </div>
    </div>

    <div id="stream-screen" class="flex-1 flex flex-col md:flex-row hidden h-full">
        <div class="flex-1 flex flex-col p-4 space-y-4 h-full">
            <div class="flex-1 bg-black shadow-lg relative aspect-video md:aspect-auto border-4 border-[#422513]">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/live_stream?channel=UC_ID_DEL_CANAL" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-between items-center bg-[#422513] text-white p-4 border-b-4 border-[#e5a900] gap-4">
                <div>
                    <h1 class="font-title text-sm lg:text-base text-[#e5a900] uppercase tracking-tight">Comunidades de Internet de Boyacá</h1>
                    <p class="text-gray-300 text-xs sm:text-sm">Iniciativa de la Comisión de Regulación de Comunicaciones (CRC)</p>
                </div>
                <a href="https://forms.google.com" target="_blank" class="w-full sm:w-auto bg-[#e5a900] hover:bg-[#cc9600] text-[#422513] font-title text-xs px-6 py-3.5 transition text-center uppercase tracking-wider">
                    Responder Encuesta
                </a>
            </div>
        </div>

        <div class="w-full md:w-80 bg-white border-t-4 md:border-t-0 md:border-l-4 border-[#422513] flex flex-col h-1/3 md:h-full shadow-xl">
            <div class="p-3 bg-[#422513] text-[#e5a900] font-title text-xs uppercase tracking-wider text-center">
                Preguntas en Vivo
            </div>
            <div class="flex-1 bg-gray-50">
                <div class="p-4 text-gray-400 text-sm text-center font-bold h-full flex items-center justify-center">
                    Área del Chat en Vivo
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const streamScreen = document.getElementById('stream-screen');
        const loginForm = document.getElementById('login-form');

        const checkAuth = () => {
            if (localStorage.getItem('crc_stream_auth') === 'true') {
                loginScreen.classList.add('hidden');
                streamScreen.classList.remove('hidden');
            }
        };

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('crc_stream_auth', 'true');
            loginScreen.classList.add('hidden');
            streamScreen.classList.remove('hidden');
        });

        checkAuth();
    </script>
</body>
</html>
