<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans h-screen flex flex-col">

    <div id="login-screen" class="flex-1 flex items-center justify-center hidden">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-500">Acceso al Stream</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Usuario</label>
                    <input type="text" id="username" required class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm mb-1">Contraseña</label>
                    <input type="password" id="password" required class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-2.5 rounded font-medium transition">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="stream-screen" class="flex-1 flex flex-col md:flex-row hidden h-full">
        <div class="flex-1 flex flex-col p-4 space-y-4 h-full">
            <div class="flex-1 bg-black rounded-lg overflow-hidden relative aspect-video md:aspect-auto">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/live_stream?channel=TU_CHANNEL_ID" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="flex justify-between items-center bg-gray-800 p-4 rounded-lg">
                <div>
                    <h1 class="text-xl font-bold">Transmisión en Vivo</h1>
                    <p class="text-gray-400 text-sm">Ayúdanos respondiendo la encuesta técnica.</p>
                </div>
                <a href="https://forms.google.com" target="_blank" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition whitespace-nowrap">
                    Responder Encuesta
                </a>
            </div>
        </div>

        <div class="w-full md:w-80 bg-gray-800 border-t md:border-t-0 md:border-l border-gray-700 flex flex-col h-1/3 md:h-full">
            <div class="p-3 border-b border-gray-700 font-bold text-gray-300">Chat en Vivo</div>
            <div class="flex-1 bg-gray-950">
                <div class="p-4 text-gray-500 text-sm text-center">Espacio de Chat Embebido</div>
            </div>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const streamScreen = document.getElementById('stream-screen');
        const loginForm = document.getElementById('login-form');

        // LÓGICA DE CONTROL DE ACCESO (Simulación MVP para evitar backend inmediato)
        // Si necesitas persistencia real, aquí conectarás Supabase/Firebase Auth.
        const checkAuth = () => {
            if (localStorage.getItem('stream_auth') === 'true') {
                streamScreen.classList.remove('hidden');
            } else {
                loginScreen.classList.remove('hidden');
            }
        };

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // Control provisional: cualquier login pasa para no frenar el despliegue
            localStorage.setItem('stream_auth', 'true');
            loginScreen.classList.add('hidden');
            streamScreen.classList.remove('hidden');
        });

        checkAuth();
    </script>
</body>
</html>
